name: nf-dock

channels:
    - conda-forge
    - bioconda
    - omnia

dependencies:
    - python==3.12
    - pip
    # ── Docking ──
    # - bioconda::gnina>=1.3
    - conda-forge::fpocket
    - conda-forge::openbabel  # mol format conversions
    # ── Structure prep ──
    - conda-forge::pdbfixer
    - conda-forge::openssl
    - conda-forge::unzip
    # utils
    - conda-forge::cmake 
    - conda-forge::cuda-toolkit
    - conda-forge::cuda-nvcc
    - conda-forge::libboost
    - conda-forge::jsoncpp
    - conda-forge::libprotobuf
    - conda-forge::protobuf
    - conda-forge::hdf5
    - conda-forge::glog
    - conda-forge::zlib
    - bioconda::atlas
    - omnia::eigen3
    - pip:
        - biopython
        - pdb-tools
        - numpy
        - pandas
        - rdkit
        - scikit-learn
        - 'multiqc>=1.21'
        - 'nvidia-cuda-runtime-cu12>=12.3'
        - 'nvidia-cuda-nvrtc-cu12>=12.3'
        - 'nvidia-cublas-cu12>=12.3'
        - 'nvidia-cudnn-cu12>=9.1'
        - 'nvidia-cufft-cu12>=11.0'
        - 'nvidia-curand-cu12>=10.3'
        - 'nvidia-cusolver-cu12>=11.5'
        - 'nvidia-cusparse-cu12>=12.2'
        - --extra-index-url https://pypi.ngc.nvidia.com
