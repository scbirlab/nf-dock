name: nf-dock

channels:
    - conda-forge
    - bioconda
    - omnia
    - gnina

dependencies:
    - python>=3.10
    - pip
    # ── Docking ──
    # - bioconda::gnina>=1.3
    # - gnina::molgrid
    - conda-forge::fpocket
    - conda-forge::openbabel>=3.0  # mol format conversions
    # ── Structure prep ──
    - conda-forge::pdbfixer
    - conda-forge::openssl
    - conda-forge::unzip
    # utils
    - conda-forge::cmake>=3.12
    - conda-forge::cudnn
    - conda-forge::cuda-toolkit==12.6.3
    - conda-forge::cuda-nvtx-dev>=12.6
    - conda-forge::cuda-nvcc>=12.6   
    # - conda-forge::jsoncpp
    # - conda-forge::libprotobuf
    # - conda-forge::protobuf
    # - conda-forge::hdf5
    # - conda-forge::glog
    - conda-forge::zlib
    # - bioconda::atlas
    # - omnia::eigen3
    - pip:
        - biopython
        - pdb-tools
        # - numpy
        # - molgrid
        # - pandas
        # - rdkit
        - scikit-learn
        - 'multiqc>=1.21'
        - pytest
        # - pyquaternion
        - torch>=2.10
        - torchvision
        - 'nvidia-cuda-runtime-cu12>=12.6,<12.7'
        - 'nvidia-cuda-nvrtc-cu12>=12.6'
        - 'nvidia-cublas-cu12>=12.6'
        - 'nvidia-cudnn-cu12>=9.1'
        - 'nvidia-cufft-cu12>=11.0'
        - 'nvidia-curand-cu12>=10.3'
        - 'nvidia-cusolver-cu12>=11.5'
        - 'nvidia-cusparse-cu12>=12'
        - --extra-index-url https://pypi.ngc.nvidia.com
        - --extra-index-url https://download.pytorch.org/whl/cu126
